<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rhino Runner</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Trebuchet MS", "Verdana", sans-serif;
        background: #bfeeff;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, #fff8cf 0%, #d7f4ff 42%, #8dd2e8 100%);
      }

      .shell {
        width: min(100vw, 1100px);
        padding: 24px;
        box-sizing: border-box;
      }

      .frame {
        border: 4px solid #34506d;
        background: #f4fbff;
        box-shadow: 0 22px 60px rgba(35, 91, 119, 0.22);
        overflow: hidden;
      }

      canvas {
        width: 100%;
        height: auto;
        display: block;
        image-rendering: pixelated;
        touch-action: none;
      }

      .caption {
        margin-top: 12px;
        color: #34506d;
        font-size: 14px;
        text-align: center;
      }

      @media (max-width: 900px) {
        .shell {
          width: 100vw;
          padding: 14px;
        }
      }

      @media (pointer: coarse) {
        body {
          place-items: start center;
        }

        .shell {
          padding: 8px 8px 14px;
        }

        .frame {
          border-width: 3px;
        }
      }

      @media (pointer: coarse) and (max-width: 720px) {
        .caption {
          font-size: 12px;
          line-height: 1.35;
        }
      }

      @media (pointer: coarse) and (orientation: portrait) {
        .caption::before {
          content: "Для лучшего обзора переверни телефон горизонтально. ";
          display: block;
          margin-bottom: 6px;
          font-weight: 700;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="frame">
        <canvas id="game" width="960" height="240"></canvas>
      </div>
      <div class="caption">Тап по экрану или Space - прыжок и старт. После проигрыша тапни или нажми Space, чтобы начать заново.</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
